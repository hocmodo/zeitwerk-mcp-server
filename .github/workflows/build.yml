name: Build MCPB Package

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Read version from manifest
        id: version
        run: echo "version=$(node -p "require('./manifest.json').version")" >> "$GITHUB_OUTPUT"

      - name: Build MCPB package
        run: |
          zip -r zeitwerk-mcp-server-${{ steps.version.outputs.version }}.mcpb \
            manifest.json \
            index.js \
            package.json \
            package-lock.json \
            icons/

      - name: Upload MCPB artifact
        uses: actions/upload-artifact@v4
        with:
          name: zeitwerk-mcp-server-${{ steps.version.outputs.version }}.mcpb
          path: zeitwerk-mcp-server-${{ steps.version.outputs.version }}.mcpb
          retention-days: 30

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Read version from manifest
        id: version
        run: echo "version=$(node -p "require('./manifest.json').version")" >> "$GITHUB_OUTPUT"

      - name: Build MCPB package
        run: |
          zip -r zeitwerk-mcp-server-${{ steps.version.outputs.version }}.mcpb \
            manifest.json \
            index.js \
            package.json \
            package-lock.json \
            icons/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: zeitwerk-mcp-server-${{ steps.version.outputs.version }}.mcpb
          generate_release_notes: true
